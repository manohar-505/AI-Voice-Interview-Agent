<!DOCTYPE html>
<html>
<head>
    <title>Interview Completed</title>
</head>
<body>

    <h2>Results</h2>

        <p><b>Answer:</b> {{ item.answer }}</p>

        <p><b>Score:</b> {{ item.score }}/10</p>

        <hr>

    {% endfor %}

</body>
</html>
